      <div class="form-group" style="margin-bottom:10px">
        <label class="form-label">Como aplicar este valor?</label>
        <select class="form-select" id="val-scope">
          <option value="default">Valor padrão (todos os meses)</option>
          <option value="this-only" selected>Apenas ${monthShort[currentDate.getMonth()]}/${currentDate.getFullYear()}</option>
          <option value="from-here">A partir deste mês em diante</option>
          <option value="range">Por período específico</option>
        </select>
      </div>
      <div class="form-row" id="val-range-wrap" style="display:none">
        <div class="form-group" style="margin-bottom:0">
          <label class="form-label">Início</label>
          <input type="month" class="form-input" id="val-start" value="${mKey}">
        </div>
        <div class="form-group" style="margin-bottom:0">
          <label class="form-label">Fim</label>
          <input type="month" class="form-input" id="val-end" value="${mKey}">
        </div>
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Dia do vencimento</label>
        <input type="number" class="form-input" id="val-day" min="1" max="31" value="${item.day||''}">
      </div>
      <div class="form-group">
        <label class="form-label">Forma de ${type==='income'?'receb.':'pagto.'}</label>
        <select class="form-select" id="val-payment">
          ${PAYMENT_METHODS.map(m => `<option value="${m.id}" ${m.id===item.payment?'selected':''}>${m.icon} ${m.label}</option>`).join('')}
        </select>
      </div>
    </div>

    ${showCardSelect ? `
      <div class="form-group">
        <label class="form-label">💳 Vincular a um cartão (opcional)</label>
        <select class="form-select" id="val-card">
          <option value="">— Não vincular —</option>
          ${cardOptions}
        </select>
      </div>
    ` : ''}

    <div class="form-section" style="border-left-color:#7c3aed">
      <p class="form-section-title" style="color:#7c3aed">🔁 Recorrência atual</p>
      <div class="form-row">
        <div class="form-group" style="margin-bottom:0">
          <label class="form-label">Tipo</label>
          <select class="form-select" id="val-rec-type">
            ${RECURRENCE_TYPES.map(r => `<option value="${r.id}" ${item.recurrence && item.recurrence.type===r.id?'selected':''}>${r.label}</option>`).join('')}
          </select>
        </div>
        <div class="form-group" style="margin-bottom:0">
          <label class="form-label">Fim em (opcional)</label>
          <input type="month" class="form-input" id="val-rec-end" value="${item.recurrence?.endMonth || ''}">
        </div>
      </div>
    </div>

    <div class="form-actions">
      <button class="btn-secondary" id="cancel-val">Cancelar</button>
      <button class="btn-primary" id="save-val">Salvar</button>
    </div>
    ${!item.id.startsWith('e_') && !item.id.startsWith('i_') ? '' :
      `<button class="btn-danger" id="delete-item" style="width:100%;margin-top:8px">🗑 Excluir item</button>`}
  `);

  setTimeout(() => { const i = document.getElementById('val-amount'); i.focus(); i.select(); }, 200);

  document.getElementById('val-scope').addEventListener('change', (e) => {
    document.getElementById('val-range-wrap').style.display = e.target.value === 'range' ? 'grid' : 'none';
  });

  document.getElementById('save-val').addEventListener('click', () => {
    const amt = parseFloat(document.getElementById('val-amount').value) || 0;
    const scope = document.getElementById('val-scope').value;
    const day = parseInt(document.getElementById('val-day').value) || item.day;
    const payment = document.getElementById('val-payment').value;
    const recType = document.getElementById('val-rec-type').value;
    const recEnd = document.getElementById('val-rec-end').value || null;
    const cardEl = document.getElementById('val-card');

    // Apply scope-based amount changes
    if (scope === 'default') {
      item.amount = amt;
      // Optionally clear existing changes? Keep them for safety
    } else if (scope === 'this-only') {
      if (!state.amountChanges[item.id]) state.amountChanges[item.id] = [];
      state.amountChanges[item.id].push({ startMonth: mKey, endMonth: mKey, amount: amt });
    } else if (scope === 'from-here') {
      if (!state.amountChanges[item.id]) state.amountChanges[item.id] = [];
      state.amountChanges[item.id].push({ startMonth: mKey, endMonth: null, amount: amt });
    } else if (scope === 'range') {
      const startM = document.getElementById('val-start').value;
      const endM = document.getElementById('val-end').value;
      if (!startM || !endM) { showToast('Defina início e fim'); return; }
      if (!state.amountChanges[item.id]) state.amountChanges[item.id] = [];
      state.amountChanges[item.id].push({ startMonth: startM, endMonth: endM, amount: amt });
    }

    item.day = day;
    item.payment = payment;
    if (cardEl) item.linkedCardId = cardEl.value || null;
    if (!item.recurrence) item.recurrence = { type: recType, startMonth: mKey, endMonth: recEnd };
    else { item.recurrence.type = recType; item.recurrence.endMonth = recEnd; }

    saveState();
    closeModal();
    showToast('Atualizado ✓');
    render();
  });
  document.getElementById('cancel-val').addEventListener('click', closeModal);
  document.getElementById('close-modal').addEventListener('click', closeModal);
  const delBtn = document.getElementById('delete-item');
  if (delBtn) {
    delBtn.addEventListener('click', () => {
      if (!confirm(`Excluir "${item.name}" e todos os seus registros?`)) return;
      if (type === 'income') state.incomes = state.incomes.filter(x => x.id !== item.id);
      else state.expenses = state.expenses.filter(x => x.id !== item.id);
      delete state.amountChanges[item.id];
      Object.keys(state.payments).forEach(k => { if (k.includes(item.id)) delete state.payments[k]; });
      saveState(); closeModal(); showToast('Item excluído'); render();
    });
  }
}

// CARD CRUD
function openCardModal(cardId = null) {
  const card = cardId ? getCardById(cardId) : null;
  const isEdit = !!card;
  showModal(`
    <div class="modal-header">
      <p class="modal-title">${isEdit ? '✏️ Editar cartão' : '💳 Novo cartão'}</p>
      <button class="modal-close" id="close-modal">×</button>
    </div>
    <div class="form-group">
      <label class="form-label">Nome do cartão</label>
      <input type="text" class="form-input" id="card-name" placeholder="Ex: NuBank, Itaú Click" value="${card?.name || ''}">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Dia do vencimento</label>
        <input type="number" class="form-input" id="card-due" min="1" max="31" value="${card?.dueDay || ''}">
      </div>
      <div class="form-group">
        <label class="form-label">Dia do fechamento</label>
        <input type="number" class="form-input" id="card-close" min="1" max="31" value="${card?.closingDay || ''}">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Cor do cartão</label>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        ${['#7c3aed','#1e40af','#dc2626','#16a34a','#d97706','#0891b2','#1f2937','#db2777'].map(c =>
          `<div class="card-color-opt" data-color="${c}" style="width:32px;height:32px;border-radius:50%;background:${c};cursor:pointer;border:3px solid ${card?.color===c?'#1a1a1a':'transparent'}"></div>`).join('')}
      </div>
      <input type="hidden" id="card-color" value="${card?.color || '#7c3aed'}">
    </div>
    <div class="form-actions">
      <button class="btn-secondary" id="cancel-card">Cancelar</button>
      <button class="btn-primary" id="save-card">${isEdit ? 'Salvar' : 'Criar'}</button>
    </div>
    ${isEdit ? `<button class="btn-danger" id="delete-card" style="width:100%;margin-top:8px">🗑 Excluir cartão</button>` : ''}
  `);

  document.querySelectorAll('.card-color-opt').forEach(opt => {
    opt.addEventListener('click', () => {
      document.querySelectorAll('.card-color-opt').forEach(o => o.style.border = '3px solid transparent');
      opt.style.border = '3px solid #1a1a1a';
      document.getElementById('card-color').value = opt.dataset.color;
    });
  });

  document.getElementById('save-card').addEventListener('click', () => {
    const name = document.getElementById('card-name').value.trim();
    const dueDay = parseInt(document.getElementById('card-due').value);
    const closingDay = parseInt(document.getElementById('card-close').value);
    const color = document.getElementById('card-color').value;
    if (!name || !dueDay || !closingDay) { showToast('Preencha todos os campos'); return; }

    if (isEdit) {
      card.name = name; card.dueDay = dueDay; card.closingDay = closingDay; card.color = color;
      // Sync bill item if exists
      if (card.billItemId) {
        const billItem = state.expenses.find(e => e.id === card.billItemId);
        if (billItem) { billItem.name = name; billItem.day = dueDay; }
      }
    } else {
      const newId = 'card_' + Date.now();
      const billItemId = 'e_card_' + Date.now();
      state.cards.push({ id: newId, name, dueDay, closingDay, color, billItemId });
      // Create matching bill item
      state.expenses.push({
        id: billItemId, name, day: dueDay, amount: 0,
        category: 'Cartão', auto: false, payment: 'boleto',
        recurrence: { type: 'monthly', startMonth: monthKey(currentDate), endMonth: null },
        linkedCardId: null, isCardBill: true, cardId: newId
      });
    }
    saveState(); closeModal(); showToast(isEdit ? 'Cartão atualizado' : 'Cartão criado'); render();
  });

  document.getElementById('cancel-card').addEventListener('click', closeModal);
  document.getElementById('close-modal').addEventListener('click', closeModal);
  const delBtn = document.getElementById('delete-card');
  if (delBtn && card) {
    delBtn.addEventListener('click', () => {
      const linked = state.expenses.filter(e => e.linkedCardId === card.id).length;
      if (!confirm(`Excluir o cartão "${card.name}"? ${linked} despesa${linked!==1?'s':''} vinculada${linked!==1?'s':''} serão desvinculadas.`)) return;
      // Unlink expenses
      state.expenses.forEach(e => { if (e.linkedCardId === card.id) e.linkedCardId = null; });
      state.extra.forEach(e => { if (e.linkedCardId === card.id) e.linkedCardId = null; });
      // Remove bill item
      if (card.billItemId) {
        state.expenses = state.expenses.filter(e => e.id !== card.billItemId);
      }
      state.cards = state.cards.filter(c => c.id !== card.id);
      saveState(); closeModal(); showToast('Cartão excluído'); render();
    });
  }
}

// SETTINGS
function openSettingsModal() {
  const dataSize = (JSON.stringify(state).length / 1024).toFixed(1);
  showModal(`
    <div class="modal-header">
      <p class="modal-title">⚙️ Configurações</p>
      <button class="modal-close" id="close-modal">×</button>
    </div>
    <div style="background:#f9fafb;padding:12px;border-radius:10px;margin-bottom:14px;font-size:12px;color:#4b5563">
      <p style="margin:0 0 4px"><strong>📦 Armazenamento</strong></p>
      <p style="margin:0">${dataSize} KB · ${state.expenses.length} despesas · ${state.incomes.length} receitas · ${state.cards.length} cartões · ${state.extra.length} avulsos</p>
    </div>

    <p style="font-size:12px;color:#6b7280;margin:0 0 6px;text-transform:uppercase;letter-spacing:0.5px;font-weight:600">Segurança</p>
    <div class="export-row">
      <button class="export-btn" id="change-password">🔑 Alterar senha</button>
      <button class="export-btn" id="lock-now">🔒 Bloquear app</button>
    </div>

    <div class="divider"></div>

    <p style="font-size:12px;color:#6b7280;margin:0 0 6px;text-transform:uppercase;letter-spacing:0.5px;font-weight:600">Backup</p>
    <div class="export-row">
      <button class="export-btn" id="export-json">📥 Exportar dados</button>
      <button class="export-btn" id="import-json">📤 Importar dados</button>
    </div>
    <input type="file" id="import-file" accept="application/json" style="display:none">

    <div class="divider"></div>

    <p style="font-size:12px;color:#6b7280;margin:0 0 6px;text-transform:uppercase;letter-spacing:0.5px;font-weight:600">Avançado</p>
    <div class="export-row">
      <button class="export-btn" id="clear-payments">🧹 Limpar pagamentos</button>
      <button class="export-btn danger" id="reset-all">⚠ Resetar tudo</button>
    </div>

    <div class="divider"></div>
    <p style="font-size:11px;color:#9ca3af;text-align:center;margin:0">Controle Financeiro · v3.0</p>
  `);

  document.getElementById('close-modal').onclick = closeModal;
  document.getElementById('change-password').onclick = () => { closeModal(); openChangePasswordModal(); };
  document.getElementById('lock-now').onclick = () => { closeModal(); lockApp(); };
  document.getElementById('export-json').onclick = () => {
    const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `financas-backup-${new Date().toISOString().slice(0,10)}.json`;
    a.click(); URL.revokeObjectURL(url);
    showToast('Backup exportado');
  };
  document.getElementById('import-json').onclick = () => document.getElementById('import-file').click();
  document.getElementById('import-file').onchange = (e) => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const imp = JSON.parse(ev.target.result);
        if (!imp.expenses || !imp.incomes) throw new Error('Inválido');
        if (!confirm('Substituir todos os dados atuais?')) return;
        state = { ...defaultState(), ...imp };
        saveState(); closeModal(); showToast('Dados importados ✓'); render();
      } catch(err) { showToast('Arquivo inválido'); }
    };
    reader.readAsText(file);
  };
  document.getElementById('clear-payments').onclick = () => {
    if (!confirm('Limpar todos os registros de pagamento?')) return;
    state.payments = {}; saveState(); closeModal(); showToast('Pagamentos limpos'); render();
  };
  document.getElementById('reset-all').onclick = () => {
    if (!confirm('Apagar TODOS os dados?')) return;
    if (!confirm('Tem certeza? Esta ação não pode ser desfeita.')) return;
    state = defaultState(); saveState(); closeModal(); showToast('Resetado'); render();
  };
}

function openChangePasswordModal() {
  showModal(`
    <div class="modal-header">
      <p class="modal-title">🔑 Alterar senha</p>
      <button class="modal-close" id="close-modal">×</button>
    </div>
    <div class="form-group"><label class="form-label">Senha atual</label>
      <input type="password" class="form-input" id="cp-current" autocomplete="off"></div>
    <div class="form-group"><label class="form-label">Nova senha (mín. 4)</label>
      <input type="password" class="form-input" id="cp-new" autocomplete="off"></div>
    <div class="form-group"><label class="form-label">Confirmar</label>
      <input type="password" class="form-input" id="cp-confirm" autocomplete="off"></div>
    <p style="font-size:12px;color:#dc2626;margin:0 0 12px;text-align:center;min-height:18px" id="cp-error"></p>
    <div class="form-actions">
      <button class="btn-secondary" id="cp-cancel">Cancelar</button>
      <button class="btn-primary" id="cp-save">Alterar</button>
    </div>
  `);
  setTimeout(() => document.getElementById('cp-current').focus(), 200);
  document.getElementById('cp-cancel').onclick = closeModal;
  document.getElementById('close-modal').onclick = closeModal;
  document.getElementById('cp-save').onclick = async () => {
    const errEl = document.getElementById('cp-error');
    const cur = document.getElementById('cp-current').value;
    const nw = document.getElementById('cp-new').value;
    const cf = document.getElementById('cp-confirm').value;
    errEl.textContent = '';
    const curHash = await hashPassword(cur, authState.salt);
    if (curHash !== authState.hash) { errEl.textContent = 'Senha atual incorreta'; return; }
    if (nw.length < 4) { errEl.textContent = 'Nova senha muito curta'; return; }
    if (nw !== cf) { errEl.textContent = 'As senhas não coincidem'; return; }
    const newSalt = generateSalt();
    const newHash = await hashPassword(nw, newSalt);
    authState.hash = newHash; authState.salt = newSalt;
    authState.failedAttempts = 0; authState.lockedUntil = null;
    saveAuthState(); closeModal(); showToast('Senha alterada 🔒');
  };
}

// =====================================================
// MAIN RENDER
// =====================================================
function render() {
  document.getElementById('month-label').textContent = `${monthShort[currentDate.getMonth()]} ${currentDate.getFullYear()}`;
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + currentScreen).classList.add('active');
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.screen === currentScreen));

  if (currentScreen === 'home') renderHome();
  else if (currentScreen === 'transactions') renderTransactions();
  else if (currentScreen === 'cards') renderCards();
  else if (currentScreen === 'calendar') renderCalendar();
  else if (currentScreen === 'charts') renderCharts();
}

function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(window._toastTimer);
  window._toastTimer = setTimeout(() => el.classList.remove('show'), 2000);
}

// =====================================================
// NAVIGATION
// =====================================================
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    currentScreen = tab.dataset.screen; selectedCalDay = null; render();
  });
});
document.getElementById('prev-month').addEventListener('click', () => {
  currentDate = new Date(currentDate.getFullYear(), currentDate.getMonth()-1, 1);
  selectedCalDay = null; render();
});
document.getElementById('next-month').addEventListener('click', () => {
  currentDate = new Date(currentDate.getFullYear(), currentDate.getMonth()+1, 1);
  selectedCalDay = null; render();
});
document.getElementById('fab-btn').addEventListener('click', () => {
  showModal(`
    <div class="modal-header"><p class="modal-title">O que adicionar?</p><button class="modal-close" id="close-modal">×</button></div>
    <div style="display:flex;flex-direction:column;gap:10px">
      <button class="action-btn add-income" id="fab-income" style="padding:16px;font-size:15px"><span>+</span> Nova receita</button>
      <button class="action-btn add-expense" id="fab-expense" style="padding:16px;font-size:15px"><span>−</span> Nova despesa</button>
      <button class="action-btn" id="fab-card" style="padding:16px;font-size:15px;justify-content:center"><span style="color:#7c3aed;font-size:18px">💳</span> Novo cartão</button>
    </div>
  `);
  document.getElementById('fab-income').onclick = () => { closeModal(); openTransactionModal('income'); };
  document.getElementById('fab-expense').onclick = () => { closeModal(); openTransactionModal('expense'); };
  document.getElementById('fab-card').onclick = () => { closeModal(); openCardModal(); };
  document.getElementById('close-modal').onclick = closeModal;
});
document.getElementById('settings-btn').addEventListener('click', openSettingsModal);

// Swipe
let touchStartX = 0, touchStartY = 0;
document.addEventListener('touchstart', (e) => {
  touchStartX = e.touches[0].clientX; touchStartY = e.touches[0].clientY;
}, { passive: true });
document.addEventListener('touchend', (e) => {
  if (!touchStartX) return;
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (Math.abs(dx) > 80 && Math.abs(dy) < 50 && currentScreen !== 'charts') {
    if (document.getElementById('modal-container').innerHTML) return;
    if (dx > 0) document.getElementById('prev-month').click();
    else document.getElementById('next-month').click();
  }
  touchStartX = 0;
}, { passive: true });

window.addEventListener('beforeunload', saveState);
</script>
</body>
